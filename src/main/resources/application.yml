# =============================================================================
#  Food Delivery System — Spring Boot 3 Configuration
#  Replaces: application.properties (legacy manual HikariCP + plain db.* keys)
# =============================================================================

# -----------------------------------------------------------------------------
# SERVER
# -----------------------------------------------------------------------------
server:
  port: 8080
  servlet:
    context-path: /                        # root context; change to /api if needed
  error:
    include-message: always                # expose error messages in JSON responses
    include-binding-errors: always



# -----------------------------------------------------------------------------
# SPRING — DATASOURCE  (MySQL — swap driver/url for PostgreSQL block below)
# -----------------------------------------------------------------------------
spring:
  # ---------------------------------------------------------------------------
  # SPRING MVC VIEW RESOLVER (for JSP)
  # ---------------------------------------------------------------------------
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

  datasource:
    # ── MySQL ──────────────────────────────────────────────────────────────
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/food_delivery_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}           # override via env-var DB_USERNAME
    password: ${DB_PASSWORD:J1w2a3l4i5t6@}       # override via env-var DB_PASSWORD  ← NEVER commit real creds
    # ── PostgreSQL (uncomment to switch) ───────────────────────────────────
    # driver-class-name: org.postgresql.Driver
    # url: jdbc:postgresql://localhost:5432/food_delivery_db
    # username: ${DB_USERNAME:postgres}
    # password: ${DB_PASSWORD:changeme}

    # ── HikariCP connection pool (replaces manual HikariConfig @Bean) ──────
    hikari:
      pool-name: FoodDeliveryHikariPool
      maximum-pool-size: 10                # was: db.pool.maximumPoolSize
      minimum-idle: 2                      # was: db.pool.minimumIdle
      connection-timeout: 30000            # was: db.pool.connectionTimeout  (ms)
      idle-timeout: 600000                 # was: db.pool.idleTimeout        (ms)
      max-lifetime: 1800000                # 30 min — recycle connections before MySQL drops them
      connection-test-query: SELECT 1      # heartbeat query

  # ---------------------------------------------------------------------------
  # JPA / HIBERNATE
  # ---------------------------------------------------------------------------
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    # database-platform: org.hibernate.dialect.PostgreSQLDialect   # ← PostgreSQL
    show-sql: true                        # flip to true only for local debug
    open-in-view: false                    # avoid lazy-loading anti-pattern in REST APIs
    hibernate:
      ddl-auto: update                   # PROD-safe: validate schema, never alter it
                                           # use 'update' temporarily when adding new entities
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true

  # ---------------------------------------------------------------------------
  # SQL INITIALISATION  (schema.sql is already in src/main/resources)
  # ---------------------------------------------------------------------------
  sql:
    init:
      mode: never                          # set to 'always' only in dev/test to re-run schema.sql

  # ---------------------------------------------------------------------------
  # SECURITY — basic defaults (your SecurityConfig @Bean overrides these)
  # ---------------------------------------------------------------------------
  security:
    user:
      name: admin                          # only active if no custom UserDetailsService is wired
      password: ${SECURITY_DEFAULT_PASSWORD:changeme}

# -----------------------------------------------------------------------------
# CUSTOM APP PROPERTIES
# -----------------------------------------------------------------------------
app:
  # ── JWT — inject into your JwtService with @Value("${app.jwt.secret}") ───
  jwt:
    secret: dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGZvb2QgZGVsaXZlcnkgc3lzdGVt
    expiration-ms: 3600000                 # 1 hour  (3_600_000 ms)
    refresh-expiration-ms: 86400000        # 24 hours — for refresh-token flow

  # ── Pricing (migrated from legacy application.properties) ─────────────────
  pricing:
    tax-rate: 0.05
    delivery-fee: 40.00
    driver-share: 0.75

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.fooddelivery: DEBUG                # verbose output for your own code
    org.springframework.security: DEBUG    # flip to INFO once JWT filters are stable
    org.springframework.web: INFO
    org.hibernate.SQL: WARN               # set to DEBUG to see every SQL query
    org.hibernate.type.descriptor.sql: WARN
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/food-delivery.log
    max-size: 10MB
    max-history: 30

# -----------------------------------------------------------------------------
# ACTUATOR  (optional — remove if not using spring-boot-starter-actuator)
# -----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
