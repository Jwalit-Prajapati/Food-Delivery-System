services:
  db:
    image: mysql:8.3.0
    container_name: food_delivery_db
    environment:
      MYSQL_ROOT_PASSWORD: J1w2a3l4i5t6@
      MYSQL_DATABASE: food_delivery_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - food_delivery_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food_delivery_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/food_delivery_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USERNAME=root
      - DB_PASSWORD=J1w2a3l4i5t6@
    networks:
      - food_delivery_network
    depends_on:
      db:
        condition: service_healthy

networks:
  food_delivery_network:
    driver: bridge

volumes:
  db_data:
